<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wszystkiego najlepszego, Ola 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f4f2;
      --surface:   #eaeae8;
      --matcha:    #4a7c59;
      --matcha-light: #7ab68a;
      --matcha-pale:  #b8d4be;
      --gold:      #c4a882;
      --gold-soft: #e2cfb4;
      --text:      #1e2620;
      --muted:     #7a8c82;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Jost', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ── PARTICLES ── */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; opacity: 0;
      animation: float-up linear infinite;
    }
    .particle.circle  { border-radius: 50%; }
    .particle.leaf    { border-radius: 50% 0 50% 0; }
    .particle.diamond { transform-origin: center; }
    @keyframes float-up {
      0%   { opacity: 0; transform: translateY(0)   rotate(0deg)   scale(1); }
      8%   { opacity: .75; }
      50%  { opacity: .5; }
      92%  { opacity: .2; }
      100% { opacity: 0; transform: translateY(-105vh) rotate(720deg) scale(.2); }
    }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto;
      padding: 64px 24px 100px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── HEADER ── */
    .eyebrow {
      font-family: var(--sans); font-weight: 400; font-size: .7rem;
      letter-spacing: .38em; text-transform: uppercase;
      color: var(--matcha-light);
      opacity: 0; animation: fade-in .8s ease forwards .3s;
    }
    .number-block {
      position: relative; margin: 12px 0 8px;
      opacity: 0; animation: fade-in .9s ease forwards .6s;
    }
    .number-block .big {
      font-family: var(--serif); font-size: clamp(7rem, 22vw, 11rem);
      font-weight: 400; line-height: .9;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--matcha);
      letter-spacing: -.02em; user-select: none;
    }
    .number-block .shine {
      position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 35%, rgba(122,182,138,.15) 50%, transparent 65%);
      background-size: 200% 100%;
      animation: shimmer 4s ease-in-out infinite 2s;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .name-line {
      font-family: var(--serif); font-style: italic;
      font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 400;
      color: var(--matcha); letter-spacing: .04em;
      opacity: 0; animation: fade-in .9s ease forwards .9s;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%; display: flex; align-items: center; gap: 16px;
      margin: 36px 0;
      opacity: 0; animation: fade-in .8s ease forwards 1.1s;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--matcha), transparent); }
    .divider-diamond { width: 6px; height: 6px; background: var(--matcha-light); transform: rotate(45deg); flex-shrink: 0; }

    /* ── SLIDESHOW ── */
    .slideshow-wrapper {
      width: 100%; margin-bottom: 44px;
      opacity: 0; animation: fade-in .9s ease forwards 1.2s;
    }
    .slideshow {
      position: relative; width: 100%;
      aspect-ratio: 4/3;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(122,182,138,.2);
      background: var(--surface);
    }
    .slide {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1.1s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .slide.active { opacity: 1; }
    .slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .slide-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted);
      font-family: var(--sans); font-weight: 200;
    }
    .slide-placeholder svg { opacity: .35; }
    .slide-placeholder span { font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; }
    /* overlay gradient */
    .slideshow::after {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to bottom, rgba(13,18,16,.15) 0%, transparent 30%, transparent 70%, rgba(13,18,16,.5) 100%);
      pointer-events: none;
    }
    /* dots */
    .dots {
      display: flex; gap: 8px; justify-content: center; margin-top: 14px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); transition: background .3s, transform .3s;
      cursor: pointer;
    }
    .dot.active { background: var(--matcha-light); transform: scale(1.3); }







    /* ── FOOTER ── */
    .footer-script {
      margin-top: 56px;
      font-family: var(--serif); font-style: italic;
      font-size: clamp(1.3rem, 4vw, 1.65rem); font-weight: 400;
      color: var(--matcha); text-align: center;
      opacity: 0; animation: fade-in .9s ease forwards 2s;
    }
    .footer-year {
      margin-top: 10px;
      font-family: var(--sans); font-weight: 300;
      font-size: .68rem; letter-spacing: .3em;
      color: var(--muted); text-align: center;
      opacity: 0; animation: fade-in .8s ease forwards 2.2s;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      main { padding: 40px 16px 72px; }
      .number-block .big {
        font-size: clamp(6rem, 28vw, 8rem);
        -webkit-text-stroke: 1px var(--matcha);
      }
      .name-line { font-size: clamp(1.8rem, 9vw, 2.6rem); }
      .eyebrow { font-size: .62rem; letter-spacing: .22em; }
      .divider { margin: 22px 0; }
      .slideshow-wrapper { margin-bottom: 28px; }
      .slideshow {
        aspect-ratio: 3/4;
        border-radius: 6px;
      }
      .dots { margin-top: 14px; gap: 12px; }
      .dot { width: 9px; height: 9px; }
      .footer-script { margin-top: 32px; font-size: clamp(1.2rem, 6vw, 1.5rem); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0s !important; animation-delay: 0s !important; }
    }
  </style>
</head>
<body>

<div id="particles"></div>

<main>
  <span class="eyebrow">z okazji urodzin</span>

  <div class="number-block">
    <div class="big">22</div>
    <div class="shine"></div>
  </div>

  <div class="name-line">Ola</div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- SLIDESHOW -->
  <div class="slideshow-wrapper">
    <div class="slideshow" id="slideshow">
      <div class="slide active">
        <div class="slide-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Twoje zdjęcia pojawią się tutaj</span>
        </div>
      </div>
    </div>
    <div class="dots" id="dots"></div>
  </div>



  <p class="footer-script">Sto lat, Olu! 🌿</p>
  <p class="footer-year">2 0 2 6</p>
</main>

<script>
  // PARTICLES — mniej na telefonie żeby nie lagowało
  const container = document.getElementById('particles');
  const colors = ['#4a7c59','#7ab68a','#b8d4be','#c4a882','#e2cfb4','#a8c9a0','#d4e8d0'];
  const shapes = ['circle','leaf','diamond'];
  const isMobile = window.innerWidth <= 480;
  const COUNT = isMobile ? 80 : 160;

  for (let i = 0; i < COUNT; i++) {
    const p = document.createElement('div');
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    p.className = 'particle ' + shape;

    const size = Math.random() * 9 + 2;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dur   = Math.random() * 10 + 5;
    const delay = Math.random() * 14;
    const left  = Math.random() * 110 - 5;
    const startY = 100 + Math.random() * 30;

    let extra = '';
    if (shape === 'diamond') {
      extra = `clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);`;
    }

    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${left}%;
      top:${startY}%;
      animation-duration:${dur}s;
      animation-delay:-${delay}s;
      ${extra}
    `;
    container.appendChild(p);
  }

  // SLIDESHOW — wklej ścieżki do swoich zdjęć poniżej
  const images = [
    'zdjecie1.jpg',
    'zdjecie2.jpg',
    'zdjecie3.jpg',
    'zdjecie4.jpg',
    'zdjecie5.jpg',
    'zdjecie6.jpg'
    // dodaj kolejne...
  ];

  const slideshowEl = document.getElementById('slideshow');
  const dotsEl      = document.getElementById('dots');
  let current = 0;

  images.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = src; img.alt = 'zdjęcie ' + (i+1);
    slide.appendChild(img);
    slideshowEl.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });

  const slideEls = slideshowEl.querySelectorAll('.slide');
  function goTo(idx) {
    slideEls[current].classList.remove('active');
    dotsEl.children[current]?.classList.remove('active');
    current = (idx + slideEls.length) % slideEls.length;
    slideEls[current].classList.add('active');
    dotsEl.children[current]?.classList.add('active');
  }
  if (slideEls.length > 1) setInterval(() => goTo(current + 1), 4000);

  // SWIPE na telefon
  let touchStartX = 0;
  slideshowEl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  slideshowEl.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
  }, { passive: true });
</script>
</body>
</html>
